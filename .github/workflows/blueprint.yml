name: Compile blueprint

on:
  push:
    branches:
      - main
    paths:
      - 'lean/blueprint/src/**'
      - 'lean/CombUnipotent/**/*.lean'
      - 'tools/extract_lean_decls.py'
      - 'tools/check_blueprint_alignment.py'
      - '.github/workflows/blueprint.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_blueprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeXLive and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            texlive-science latexmk graphviz graphviz-dev libgraphviz-dev \
            pkg-config

      - name: Install blueprint tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pygraphviz plasTeX leanblueprint \
            plastexdepgraph plastexshowmore

      - name: Extract Lean declarations (decl → file:line table)
        run: |
          python3 tools/extract_lean_decls.py \
            --root lean/CombUnipotent \
            --repo-root . \
            --out lean/blueprint/src/lean_decls.json

      - name: Verify blueprint → Lean alignment
        run: |
          python3 tools/check_blueprint_alignment.py \
            --blueprint lean/blueprint/src \
            --decls lean/blueprint/src/lean_decls.json \
            --strict

      - name: Compile web version
        working-directory: lean/blueprint/src
        run: |
          plastex -c plastex.cfg web.tex

      - name: Assemble site directory for Pages
        run: |
          rm -rf _site
          mkdir -p _site/blueprint/find

          # Copy compiled blueprint web pages under /blueprint/.
          cp -R lean/blueprint/web/* _site/blueprint/

          # find/ — Lean decl redirect page + JSON lookup table.
          if [ -f docs/blueprint/find/index.html ]; then
            cp docs/blueprint/find/index.html _site/blueprint/find/index.html
          fi
          cp lean/blueprint/src/lean_decls.json _site/blueprint/find/lean_decls.json

          # Copy legacy markdown docs + landing page from docs/ (if present).
          if [ -f docs/index.html ]; then
            cp docs/index.html _site/index.html
          fi
          for md in docs/*.md; do
            [ -f "$md" ] && cp "$md" _site/
          done

          touch _site/.nojekyll
          echo "--- _site listing ---"
          ls -la _site/
          echo "--- _site/blueprint listing ---"
          ls _site/blueprint/ | head -10
          echo "--- _site/blueprint/find listing ---"
          ls _site/blueprint/find/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Sync docs/blueprint (for GitHub browsing)
        run: |
          if [ -f docs/blueprint/find/index.html ]; then
            cp docs/blueprint/find/index.html /tmp/find-index.html
          fi
          mkdir -p docs/blueprint
          rm -rf docs/blueprint/*
          cp -R lean/blueprint/web/* docs/blueprint/
          mkdir -p docs/blueprint/find
          if [ -f /tmp/find-index.html ]; then
            cp /tmp/find-index.html docs/blueprint/find/index.html
          fi
          cp lean/blueprint/src/lean_decls.json docs/blueprint/find/lean_decls.json
          touch docs/.nojekyll

      - name: Commit updated docs/blueprint (if changed)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/blueprint docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No changes to blueprint output."
          else
            git commit -m "ci(blueprint): auto-regenerate docs/blueprint/ [skip ci]"
            git push
          fi

  deploy:
    needs: build_blueprint
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
