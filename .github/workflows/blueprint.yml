name: Compile blueprint

on:
  push:
    branches:
      - lean
      - main
    paths:
      - 'lean/blueprint/**'
      - '.github/workflows/blueprint.yml'
  workflow_dispatch:

# Grant permissions needed for deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_blueprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeXLive and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full graphviz graphviz-dev libgraphviz-dev pkg-config

      - name: Install blueprint tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pygraphviz plasTeX leanblueprint plastexdepgraph plastexshowmore

      - name: Compile PDF (optional — skip on failure)
        working-directory: lean/blueprint
        run: |
          cd src
          latexmk -pdf -halt-on-error print.tex || echo "PDF compile failed, continuing"
          mkdir -p ../print && cp -f print.pdf ../print/print.pdf 2>/dev/null || true

      - name: Compile web version
        working-directory: lean/blueprint/src
        run: |
          plastex -c plastex.cfg web.tex

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -R lean/blueprint/web/* _site/
          # Add a redirect at the repo root to the blueprint
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>Redirecting…</title>
          <meta http-equiv="refresh" content="0; url=./index.html">
          <link rel="canonical" href="./index.html">
          EOF
          ls _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build_blueprint
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
