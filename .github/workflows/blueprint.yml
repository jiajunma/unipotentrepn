name: Compile blueprint

on:
  push:
    branches:
      - main
      - lean
    paths:
      - 'lean/blueprint/src/**'
      - '.github/workflows/blueprint.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_blueprint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeXLive and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-science graphviz graphviz-dev libgraphviz-dev pkg-config

      - name: Install blueprint tools
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pygraphviz plasTeX leanblueprint plastexdepgraph plastexshowmore

      - name: Compile web version
        working-directory: lean/blueprint/src
        run: |
          plastex -c plastex.cfg web.tex

      - name: Sync HTML to docs/blueprint
        run: |
          mkdir -p docs/blueprint
          rm -rf docs/blueprint/*
          cp -R lean/blueprint/web/* docs/blueprint/
          touch docs/.nojekyll

      - name: Commit updated blueprint (if changed, main only)
        if: github.ref_name == 'main'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/blueprint docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No changes to blueprint output."
          else
            git commit -m "ci(blueprint): auto-regenerate docs/blueprint/ [skip ci]"
            git push
          fi
